name: .NET Desktop Build

on:
  push:
    branches: ["**"] # Trigger on any branch
    tags: ["v*"] # Trigger on version tags
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest # Required for Windows Forms/.NET 9.0-windows

    env:
      Solution_Name: ZMKSplit.sln
      Project_Name: ZMKSplit.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the .NET 9.0 SDK
      - name: Install .NET 9.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # Add MSBuild to the PATH
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      # Restore NuGet packages
      - name: Restore NuGet packages
        run: dotnet restore $env:Solution_Name

      # Build the solution using MSBuild (better for Windows-specific projects)
      - name: Build the solution
        run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform="Any CPU" /p:RestorePackages=false /verbosity:minimal

      # Sign the executable with a self-signed certificate (requires SIGNING_CERT_PFX_BASE64 and
      # SIGNING_CERT_PASSWORD secrets). Step is skipped silently when secrets are not configured.
      - name: Sign executable
        shell: powershell
        env:
          PFX_BASE64: ${{ secrets.SIGNING_CERT_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:PFX_BASE64)) {
            Write-Host "No signing certificate configured, skipping."
            exit 0
          }

          $pfxPath = [System.IO.Path]::Combine($env:RUNNER_TEMP, "signing.pfx")
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter "signtool.exe" |
              Where-Object { $_.FullName -match "x64" } |
              Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName

          & $signtool sign `
              /f $pfxPath `
              /p $env:PFX_PASSWORD `
              /tr http://timestamp.digicert.com `
              /td sha256 /fd sha256 `
              "bin\Release\net9.0-windows10.0.19041.0\ZMKSplit.exe"

          Remove-Item $pfxPath -Force

      # Upload the build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZMKSplit-Release
          path: |
            bin/Release/net9.0-windows10.0.19041.0/
            !bin/Release/net9.0-windows10.0.19041.0/*.pdb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZMKSplit-Release
          path: release-files

      - name: Create release archive
        run: |
          Compress-Archive -Path "release-files\*" -DestinationPath "ZMKSplit-${{ github.ref_name }}.zip"
        shell: powershell

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ZMKSplit ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ZMKSplit-${{ github.ref_name }}.zip
